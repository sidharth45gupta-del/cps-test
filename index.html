<!DOCTYPE html>
<html>
<head>
  <title>CPS Battle Pro ⚡</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      background: black;
      color: #00ffcc;
    }

    h1 {
      text-shadow: 0 0 15px #00ffcc;
    }

    #box {
      width: 80%;
      max-width: 350px;
      height: 200px;
      margin: 30px auto;
      background: #111;
      border: 2px solid #00ffcc;
      border-radius: 20px;
      line-height: 200px;
      font-size: 24px;
      cursor: pointer;
      transition: 0.2s;
    }

    #box:active {
      background: #00ffcc;
      color: black;
      transform: scale(0.95);
    }

    .btn {
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: #00ffcc;
      color: black;
    }

    canvas {
      max-width: 90%;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h1>⚡ CPS Battle Pro</h1>

<div>
  <button class="btn" onclick="setTime(1)">1s</button>
  <button class="btn" onclick="setTime(5)">5s</button>
  <button class="btn" onclick="setTime(10)">10s</button>
</div>

<div id="box">Click to Start</div>

<p>Time: <span id="time">5</span></p>
<p>Clicks: <span id="clicks">0</span></p>
<p>CPS: <span id="cps">0</span></p>

<button class="btn" onclick="restart()">Restart</button>

<canvas id="graph"></canvas>

<script>
let clicks = 0;
let time = 5;
let maxTime = 5;
let started = false;
let countdownStarted = false;

let cpsData = [];

const ctx = document.getElementById('graph').getContext('2d');
let chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [{
      label: 'CPS',
      data: [],
      borderWidth: 2
    }]
  }
});

function setTime(t){
  maxTime = t;
  restart();
}

const box = document.getElementById("box");

box.onclick = () => {
  if (!countdownStarted) {
    startCountdown();
  } else if (started) {
    clicks++;
    document.getElementById("clicks").innerText = clicks;
  }
};

function startCountdown() {
  countdownStarted = true;
  let count = 3;
  box.innerText = count;

  let cd = setInterval(()=>{
    count--;
    if(count === 0){
      clearInterval(cd);
      startGame();
    } else {
      box.innerText = count;
    }
  },1000);
}

function startGame() {
  started = true;
  box.innerText = "CLICK!";
  let interval = setInterval(()=>{
    time--;
    document.getElementById("time").innerText = time;

    let cps = clicks / (maxTime - time);
    cpsData.push(cps);

    chart.data.labels.push("");
    chart.data.datasets[0].data.push(cps);
    chart.update();

    if(time === 0){
      clearInterval(interval);
      started = false;
      let final = (clicks / maxTime).toFixed(2);
      document.getElementById("cps").innerText = final;
      box.innerText = "Finished!";
    }
  },1000);
}

function restart(){
  clicks = 0;
  time = maxTime;
  started = false;
  countdownStarted = false;
  cpsData = [];

  document.getElementById("clicks").innerText = 0;
  document.getElementById("time").innerText = time;
  document.getElementById("cps").innerText = 0;
  box.innerText = "Click to Start";

  chart.data.labels = [];
  chart.data.datasets[0].data = [];
  chart.update();
}
</script>

</body>
</html>
