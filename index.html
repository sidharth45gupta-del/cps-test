<!DOCTYPE html>
<html>
<head>
  <title>CPS Global 🌍</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    body {
      background: black;
      color: #00ffcc;
      text-align: center;
      font-family: Arial;
    }

    #box {
      width: 300px;
      height: 200px;
      margin: 20px auto;
      border: 2px solid #00ffcc;
      border-radius: 20px;
      line-height: 200px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>⚡ CPS Global Battle</h1>

<input id="name" placeholder="Enter name" />
<div id="box">Click to Start</div>

<p>CPS: <span id="cps">0</span></p>

<ul id="board"></ul>

<script>

// 🔥 YOUR FIREBASE CONFIG (already correct)
const firebaseConfig = {
  apiKey: "AIzaSyCOp7OVHvVZqLkERAWzeupEXA45fouDNcU",
  authDomain: "cps-test-20b25.firebaseapp.com",
  projectId: "cps-test-20b25",
  storageBucket: "cps-test-20b25.firebasestorage.app",
  messagingSenderId: "484754631979",
  appId: "1:484754631979:web:4610d753d8bf22b980a96e"
};

// Init
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Game
let clicks = 0;
let started = false;

const box = document.getElementById("box");

box.onclick = () => {
  if (!started) {
    started = true;
    setTimeout(endGame, 5000);
  }
  clicks++;
};

async function endGame() {
  let cps = (clicks / 5).toFixed(2);
  document.getElementById("cps").innerText = cps;

  let name = document.getElementById("name").value || "Player";

  await db.collection("scores").add({
    name: name,
    cps: parseFloat(cps)
  });

  loadScores();
}

async function loadScores() {
  let board = document.getElementById("board");
  board.innerHTML = "";

  let snapshot = await db.collection("scores")
    .orderBy("cps", "desc")
    .limit(5)
    .get();

  snapshot.forEach(doc => {
    let d = doc.data();
    board.innerHTML += `<li>${d.name} - ${d.cps}</li>`;
  });
}

loadScores();

</script>

</body>
</html>
