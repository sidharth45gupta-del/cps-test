<!DOCTYPE html>
<html>
<head>
  <title>CPS Ultimate 🌍⚡</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    body {
      background: black;
      color: #00ffcc;
      text-align: center;
      font-family: Arial;
    }

    #box {
      width: 300px;
      height: 200px;
      margin: 20px auto;
      border: 2px solid #00ffcc;
      border-radius: 20px;
      line-height: 200px;
      cursor: pointer;
      font-size: 22px;
    }

    .btn {
      padding: 8px 12px;
      margin: 5px;
      border-radius: 10px;
      border: none;
      background: #00ffcc;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>⚡ CPS Ultimate</h1>

<input id="name" placeholder="Enter your name" />

<div>
  <button class="btn" onclick="setTime(1)">1s</button>
  <button class="btn" onclick="setTime(5)">5s</button>
  <button class="btn" onclick="setTime(10)">10s</button>
</div>

<div id="box">Click to Start</div>

<p>Time: <span id="time">5</span></p>
<p>Clicks: <span id="clicks">0</span></p>
<p>CPS: <span id="cps">0</span></p>

<h3>🏆 Leaderboard</h3>
<ul id="board"></ul>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCOp7OVHvVZqLkERAWzeupEXA45fouDNcU",
  authDomain: "cps-test-20b25.firebaseapp.com",
  projectId: "cps-test-20b25",
  storageBucket: "cps-test-20b25.firebasestorage.app",
  messagingSenderId: "484754631979",
  appId: "1:484754631979:web:4610d753d8bf22b980a96e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let clicks = 0;
let time = 5;
let maxTime = 5;
let gameStarted = false;
let countdownRunning = false;

const box = document.getElementById("box");

function setTime(t){
  maxTime = t;
  document.getElementById("time").innerText = t;
}

box.onclick = () => {
  if (!countdownRunning && !gameStarted) {
    startCountdown();
  } else if (gameStarted) {
    clicks++;
    document.getElementById("clicks").innerText = clicks;
  }
};

function startCountdown() {
  countdownRunning = true;
  let count = 3;
  box.innerText = count;

  let cd = setInterval(() => {
    count--;
    if (count === 0) {
      clearInterval(cd);
      startGame();
    } else {
      box.innerText = count;
    }
  }, 1000);
}

function startGame() {
  countdownRunning = false;
  gameStarted = true;
  clicks = 0;
  time = maxTime;

  document.getElementById("clicks").innerText = 0;
  document.getElementById("time").innerText = time;
  box.innerText = "CLICK!";

  let interval = setInterval(() => {
    time--;
    document.getElementById("time").innerText = time;

    if (time <= 0) {
      clearInterval(interval);
      endGame();
    }
  }, 1000);
}

async function endGame() {
  gameStarted = false;

  let cps = (clicks / maxTime).toFixed(2);
  document.getElementById("cps").innerText = cps;
  box.innerText = "Finished!";

  let name = document.getElementById("name").value || "Player";

  await db.collection("scores").add({
    name: name,
    cps: parseFloat(cps)
  });

  loadScores();
}

async function loadScores() {
  let board = document.getElementById("board");
  board.innerHTML = "";

  let snapshot = await db.collection("scores")
    .orderBy("cps", "desc")
    .limit(5)
    .get();

  snapshot.forEach(doc => {
    let d = doc.data();
    board.innerHTML += `<li>${d.name} - ${d.cps}</li>`;
  });
}

loadScores();

</script>

</body>
</html>
