<!DOCTYPE html>
<html>
<head>
  <title>CPS Test</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #111;
      color: white;
    }
    #box {
      width: 300px;
      height: 200px;
      background: red;
      margin: 50px auto;
      line-height: 200px;
      cursor: pointer;
      font-size: 20px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h1>CPS Test</h1>
<p>Click the box as fast as you can!</p>
<div id="box">Click Here</div>
<p>Time: <span id="time">5</span>s</p>
<p>Clicks: <span id="clicks">0</span></p>
<p>CPS: <span id="cps">0</span></p>

<script>
let clicks = 0;
let time = 5;
let started = false;

const box = document.getElementById("box");

box.onclick = () => {
  if (!started) {
    started = true;
    startTimer();
  }
  clicks++;
  document.getElementById("clicks").innerText = clicks;
};

function startTimer() {
  let interval = setInterval(() => {
    time--;
    document.getElementById("time").innerText = time;

    if (time === 0) {
      clearInterval(interval);
      let cps = clicks / 5;
      document.getElementById("cps").innerText = cps.toFixed(2);
      box.innerText = "Finished!";
    }
  }, 1000);
}
</script>

</body>
</html>
